<div class="container position-absolute top-50 start-50 translate-middle">
  <div class="card text-center">
    <h3 class="card-header">Study Overview</h3>
    <div class="instructions card-body">
      <div class="instruction-list">
        <p>You will be presented with a series of stories.</p>

        <p>After each story, you will be asked to recall it.</p>

        <p>
          You can take a break between stories,<br />
          but finish respective recall exercise before you take a break.
        </p>
      </div>

      <div class="instructionsnav">
        <div class="row">
          <div class="col-2">
            <button
              type="button"
              id="prev"
              value="prev"
              class="btn btn-primary btn-lg previous"
            >
              Previous
            </button>
          </div>
          <div class="col-8">
            <center>
              <button
                type="button"
                id="next"
                value="next"
                class="btn btn-success btn-lg continue"
                disabled
              >
                Begin study
              </button>
            </center>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
