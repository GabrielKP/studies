<!DOCTYPE html>
<!-- Starts the experiment with a debug id -->
<html>
  <head>
    <meta charset="utf-8" />
    <title>Study</title>
  </head>

  <body>
    <h1>Study Starting Page</h1>

    <hr />

    <div style="margin-bottom: 20px">
      <label for="pid-input">Participant ID (PID):</label>
      <input
        type="text"
        id="pid-input"
        placeholder="Enter participant ID"
        style="margin-left: 10px; padding: 5px; width: 200px"
      />
      <br /><br />
      <label for="sid-input">Session ID (SID):</label>
      <input
        type="text"
        id="sid-input"
        placeholder="Enter session ID"
        style="margin-left: 10px; padding: 5px; width: 200px"
      />
    </div>

    <hr />

    <p>Online: <a href="#" id="debug">debug</a>.</p>
    <p>Online: <a href="#" id="test">live</a>.</p>

    <hr />

    <p>Local: <a href="#" id="local.debug"> debug</a>.</p>
    <p>Local: <a href="#" id="local.test"> live</a>.</p>

    <hr />

    <script type="text/javascript">
      function updateLinks() {
        var pidInput = document.getElementById("pid-input");
        var sidInput = document.getElementById("sid-input");

        // Get values from input fields, or use defaults if empty
        var participantID = pidInput.value.trim() || "debug.pid." + makeid();
        var sessionID = sidInput.value.trim() || "debug.session-id." + makeid();

        var href_debug =
          "index.html?PID=" +
          encodeURIComponent(participantID) +
          "&SID=" +
          encodeURIComponent(sessionID) +
          "&mode=debug";
        var href_test =
          "index.html?PID=" +
          encodeURIComponent(participantID) +
          "&SID=" +
          encodeURIComponent(sessionID) +
          "&mode=live";

        document.getElementById("debug").setAttribute("href", href_debug);
        document.getElementById("test").setAttribute("href", href_test);
        document
          .getElementById("local.test")
          .setAttribute("href", href_test + "&local");
        document
          .getElementById("local.debug")
          .setAttribute("href", href_debug + "&local");
      }

      // Update links when input fields change
      document
        .getElementById("pid-input")
        .addEventListener("input", updateLinks);
      document
        .getElementById("sid-input")
        .addEventListener("input", updateLinks);

      // Initialize links on page load
      updateLinks();
    </script>
  </body>
</html>
