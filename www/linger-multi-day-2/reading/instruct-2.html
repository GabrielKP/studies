<div class="container position-absolute top-50 start-50 translate-middle">
  <div class="card text-center">
    <h3 class="card-header">Story reading</h3>
    <div class="instructions card-body">
      <div class="card-text">
        <p>
          After reading each sentence, press the <b>ENTER</b> key to view the
          next one.
        </p>

        <p>
          '***' indicates a paragraph break, press <b>ENTER</b> to continue.
        </p>

        <p>Please read the text naturally, at your own pace.</p>
      </div>

      <div class="instructionsnav">
        <div class="row">
          <div class="col-2">
            <button
              type="button"
              id="prev"
              value="prev"
              class="btn btn-primary btn-lg previous"
            >
              Previous
            </button>
          </div>
          <div class="col-8">
            <center>
              <button
                type="button"
                id="next"
                value="next"
                class="btn btn-success btn-lg continue"
                disabled
              >
                Begin
              </button>
            </center>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
