<div class="container position-absolute top-50 start-50 translate-middle">
  <div class="card text-center">
    <h3 class="card-header">Recall</h3>
    <div class="instructions card-body">
      <div class="card-text">
        <p>
          After pressing 'Begin', recall the story you read yesterday in as much
          detail as possible.
        </p>

        <p>
          After 5 minutes, you can stop the recording once you are finished
          recalling the story.
        </p>

        <p>Speak clearly.</p>

        <div class="instructionsnav">
          <div class="row">
            <div class="col-2">
              <button
                type="button"
                id="prev"
                value="prev"
                class="btn btn-primary btn-lg previous"
              >
                Previous
              </button>
            </div>
            <div class="col-8">
              <center>
                <button
                  type="button"
                  id="next"
                  value="next"
                  class="btn btn-success btn-lg continue"
                  disabled
                >
                  Begin
                </button>
              </center>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
